name: YouTube Posts Monitor

on:
  schedule:
    - cron: "0 0 * * *" # 한국시간 오전 9시
    - cron: "0 6 * * *" # 한국시간 오후 3시
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python monitor_youtube_posts.py

      - name: Save seen posts
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add seen_posts.json
          git diff --cached --quiet || git commit -m "Update seen posts"
          git push
